{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Customers</h2>
  <div class="d-flex align-items-center gap-2">
    <a href="{{ url_for('register_customers') }}" class="btn btn-outline-primary btn-sm">Download Register</a>
    <a href="{{ url_for('customer_create') }}" class="btn btn-primary">Add Customer</a>
  </div>
</div>
<form class="row g-2 mb-3" method="get">
  <div class="col-md-4">
    <input type="text" name="q" value="{{ q }}" class="form-control" placeholder="Search by name or phone">
  </div>
  <div class="col-md-2">
    <button class="btn btn-outline-primary" type="submit">Search</button>
  </div>
  <div class="col-md-2">
    <a href="{{ url_for('customers_list') }}" class="btn btn-outline-secondary">Clear</a>
  </div>
</form>
<table class="table table-striped table-sm" id="customersTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for c in customers %}
    <tr>
      <td><a href="{{ url_for('customer_detail', customer_id=c.id) }}">{{ c.first_name }} {{ c.last_name }}</a></td>
      <td>{{ c.phone }}</td>
      <td>{{ c.email }}</td>
      <td class="text-end">
        <a href="{{ url_for('customer_edit', customer_id=c.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
        <form method="post" action="{{ url_for('customer_delete', customer_id=c.id) }}" style="display:inline" onsubmit="return confirm('Delete this customer?');">
          <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% if not customers %}
<p>No customers found.</p>
{% endif %}
{% endblock %}
