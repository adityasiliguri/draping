{% extends 'base.html' %}
{% block content %}
<h2>Create Job</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Customer</label>
    <div class="d-flex gap-2 flex-wrap align-items-center">
      <select name="customer_id" class="form-select" style="max-width: 360px;" required>
        <option value="">Select customer</option>
        {% for c in customers %}
          <option value="{{ c.id }}" {% if selected_customer_id == c.id %}selected{% endif %}>{{ c.first_name }} {{ c.last_name }} ({{ c.phone }})</option>
        {% endfor %}
      </select>
      <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#quickCustomerModal">Quick Add</button>
    </div>
    <div class="form-text mt-1">
      Use Quick Add to create a new customer without leaving this screen.
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Job Number (auto, can edit)</label>
    <input type="text" name="job_number" class="form-control" value="{{ suggested_job_number }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Delivery Date</label>
    <input type="date" name="date_delivery" class="form-control">
  </div>
  <button class="btn btn-primary" type="submit">Create</button>
  <a href="{{ url_for('jobs_list') }}" class="btn btn-secondary">Cancel</a>
</form>

<!-- Quick Add Customer Modal -->
<div class="modal fade" id="quickCustomerModal" tabindex="-1" aria-labelledby="quickCustomerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="quickCustomerModalLabel">Quick Add Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="post" action="{{ url_for('customer_quick_create') }}">
        <div class="modal-body">
          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email (optional)</label>
              <input type="email" name="email" class="form-control">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save &amp; Select</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
