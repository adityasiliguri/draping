{% extends 'base.html' %}
{% block content %}
<h2>Edit Job {{ job.job_number }}</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Customer</label>
    <select name="customer_id" class="form-select" required>
      {% for c in customers %}
        <option value="{{ c.id }}" {% if job.customer_id == c.id %}selected{% endif %}>{{ c.first_name }} {{ c.last_name }} ({{ c.phone }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Job Number</label>
    <input type="text" name="job_number" class="form-control" value="{{ job.job_number }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Delivery Date</label>
    <input type="date" name="date_delivery" class="form-control" value="{% if job.date_delivery %}{{ job.date_delivery.strftime('%Y-%m-%d') }}{% endif %}">
  </div>
  <button class="btn btn-primary" type="submit">Save</button>
  <a href="{{ url_for('jobs_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
