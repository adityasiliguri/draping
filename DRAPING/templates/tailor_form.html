{% extends 'base.html' %}
{% block content %}
<h2>{{ 'Edit Tailor / Karigor' if tailor else 'Add Tailor / Karigor' }}</h2>
<form method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" value="{{ tailor.name if tailor else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input type="text" name="phone" class="form-control" value="{{ tailor.phone if tailor else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ tailor.notes if tailor else '' }}</textarea>
  </div>
  <button class="btn btn-primary" type="submit">Save</button>
  <a href="{{ url_for('tailors_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
